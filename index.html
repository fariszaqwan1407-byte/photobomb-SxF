<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photobomb</title>
</head>
<body>

<h2>Ambil Gambar</h2>

<video id="video" autoplay playsinline style="width:100%; max-width:400px;"></video>
<br>

<button onclick="capture()">Capture</button>

<br><br>

<img id="preview" style="width:100%; max-width:400px; display:none;" />

<br><br>

<button id="submitBtn" onclick="submitPhoto()" style="display:none;">Submit</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const preview = document.getElementById('preview');
const submitBtn = document.getElementById('submitBtn');

// buka camera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

// ambil gambar
function capture() {
    const context = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    context.drawImage(video, 0, 0);

    const imageData = canvas.toDataURL('image/png');

    preview.src = imageData;
    preview.style.display = 'block';

    submitBtn.style.display = 'block';
}

// submit (nanti connect Google Script kau)
function submitPhoto() {
    const imageData = canvas.toDataURL('image/png');

    fetch("YOUR_GOOGLE_SCRIPT_URL", {
        method: "POST",
        body: JSON.stringify({ image: imageData })
    })
    .then(res => alert("Berjaya upload!"))
    .catch(err => alert("Error upload"));
}
</script>

</body>
</html>
